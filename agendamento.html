<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - CALM Saúde Integrativa</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --green-primary: #6BB7A8;
            --green-dark: #3A7D73;
            --white: #FFFFFF;
            --beige: #F5F1EC;
            --wood: #D8C3A5;
            --gray: #EAEAEA;
            --text-dark: #2C3E3A;
            --text-light: #5A6D68;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: var(--beige);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .booking-container {
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            margin: 40px auto;
        }

        .booking-img-panel {
            background-image: url('https://lh3.googleusercontent.com/gps-cs-s/APNQkAEzYqOch9Pc4am83Jp_k2Fz8qI_TJs8cZbfh7rpVvqL0xfW-ohItrrosBdU2ebv2t5b0giE1xvt3yR_i10WpbsV2JSlofWRDr7uf141uSQJz4BIX6ikjEBowrcylwWFHGJOycGiQvRh_rsi=s1360-w1360-h1020-rw');
            background-size: cover;
            background-position: center;
            position: relative;
            min-height: 250px;
        }

        .booking-img-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(58, 125, 115, 0.4), rgba(58, 125, 115, 0.1));
        }

        @media (min-width: 992px) {
            .booking-img-panel {
                min-height: 100%;
            }
        }

        .booking-form-panel {
            padding: 50px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-light);
            text-decoration: none;
            margin-bottom: 30px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--green-dark);
        }

        .back-link i {
            margin-right: 8px;
        }

        .form-title {
            color: var(--green-dark);
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        .form-subtitle {
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .form-control,
        .form-select {
            border: 1px solid var(--gray);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 1rem;
            color: var(--text-dark);
            background-color: #FAFAFA;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 4px rgba(107, 183, 168, 0.15);
            border-color: var(--green-primary);
            background-color: var(--white);
        }

        .form-label {
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .btn-custom {
            border-radius: 50px;
            padding: 14px 30px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            border: none;
            cursor: pointer;
            font-size: 1.05rem;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: var(--white);
            margin-bottom: 15px;
        }

        .btn-whatsapp:hover {
            background-color: #20BA56;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        .btn-email {
            background-color: var(--beige);
            color: var(--green-dark);
            border: 1px solid var(--wood);
        }

        .btn-email:hover {
            background-color: var(--wood);
            color: var(--green-dark);
            transform: translateY(-2px);
        }

        @media (max-width: 576px) {
            .booking-form-panel {
                padding: 30px 20px;
            }

            .form-title {
                font-size: 1.8rem;
            }
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            color: white;
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row booking-container">
            <div class="col-lg-5 d-none d-lg-block p-0">
                <div class="booking-img-panel"></div>
            </div>
            <div class="col-lg-7 p-0">
                <div class="booking-form-panel">
                    <a href="pagina_index.html" class="back-link"><i class="ph ph-arrow-left"></i> Voltar para o início</a>

                    <h1 class="form-title font-serif">Agende seu Momento</h1>
                    <p class="form-subtitle">Preencha os dados abaixo e entraremos em contato para confirmar sua
                        reserva.</p>

                    <form id="agendamentoForm">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="nome" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" required
                                    placeholder="Ex: Maria Silva">
                            </div>

                            <div class="col-md-6">
                                <label for="telefone" class="form-label">WhatsApp</label>
                                <input type="tel" class="form-control" id="telefone" required
                                    placeholder="(11) 99999-9999">
                            </div>

                            <div class="col-md-6">
                                <label for="servico" class="form-label">Serviço Desejado</label>
                                <select class="form-select" id="servico" required>
                                    <option value="" selected disabled>Selecione um serviço...</option>
                                    <option value="Head SPA">Head SPA</option>
                                    <option value="Massagem terapêutica">Massagem Terapêutica</option>
                                    <option value="Aromaterapia">Aromaterapia</option>
                                    <option value="Barras de Access">Barras de Access</option>
                                    <option value="Nutrição">Nutrição Integrativa</option>
                                    <option value="Outros / Dúvida">Outros / Dúvida</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="data" class="form-label">Data Preferencial</label>
                                <input type="date" class="form-control" id="data" required>
                            </div>

                            <div class="col-md-6">
                                <label for="horario" class="form-label">Horário Preferencial</label>
                                <input type="time" class="form-control" id="horario" required>
                            </div>

                            <div class="col-12">
                                <label for="observacoes" class="form-label">Observações (Opcional)</label>
                                <textarea class="form-control" id="observacoes" rows="3"
                                    placeholder="Alguma condição de saúde, alergia ou preferência que devemos saber?"></textarea>
                            </div>
                        </div>

                        <div class="mt-5">
                            <button type="button" class="btn-custom btn-whatsapp" onclick="enviarWhatsApp()">
                                <i class="ph ph-whatsapp-logo fs-4"></i> Agendar via WhatsApp
                            </button>
                            <button type="button" class="btn-custom btn-email" onclick="enviarEmail()">
                                <i class="ph ph-envelope-simple fs-4"></i> Enviar por Email
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating WhatsApp -->
    <a href="https://wa.me/5511993410446" class="whatsapp-float" target="_blank" title="Fale conosco">
        <i class="ph ph-whatsapp-logo"></i>
    </a>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Configs
        const NUMERO_WHATSAPP = "5511993410446";
        const EMAIL_DESTINO = "teste@email.com";

        // Preencher serviço se vier via URL parameter
        window.onload = function () {
            const urlParams = new URLSearchParams(window.location.search);
            const servico = urlParams.get('servico');
            if (servico) {
                const select = document.getElementById('servico');
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === servico) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }
        };

        // Máscara de telefone
        const inputTelefone = document.getElementById('telefone');
        inputTelefone.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);

            if (value.length > 2) {
                value = '(' + value.substring(0, 2) + ') ' + value.substring(2);
            }
            if (value.length > 10) {
                value = value.substring(0, 10) + '-' + value.substring(10);
            }
            e.target.value = value;
        });

        // Formatar Data (YYYY-MM-DD para DD/MM/YYYY)
        function formatarData(data) {
            if (!data) return '';
            const partes = data.split('-');
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        // Validar formulário
        function validarForm() {
            const form = document.getElementById('agendamentoForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return false;
            }
            return true;
        }

        // Gerar Mensagem
        function gerarMensagem() {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const servico = document.getElementById('servico').value;
            const data = formatarData(document.getElementById('data').value);
            const horario = document.getElementById('horario').value;
            const observacoes = document.getElementById('observacoes').value;

            let mensagem = `Olá, gostaria de agendar um atendimento:\n\n`;
            mensagem += `*Nome:* ${nome}\n`;
            mensagem += `*Telefone:* ${telefone}\n`;
            mensagem += `*Serviço:* ${servico}\n`;
            mensagem += `*Data:* ${data}\n`;
            mensagem += `*Horário:* ${horario}\n`;
            if (observacoes) {
                mensagem += `*Observações:* ${observacoes}\n`;
            }

            return mensagem;
        }

        // Enviar WhatsApp
        function enviarWhatsApp() {
            if (!validarForm()) return;

            const mensagem = encodeURIComponent(gerarMensagem());
            const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensagem}`;
            window.open(url, '_blank');
        }

        // Enviar Email
        function enviarEmail() {
            if (!validarForm()) return;

            const servico = document.getElementById('servico').value;
            const assunto = encodeURIComponent(`Solicitação de Agendamento - ${servico}`);
            const mensagem = encodeURIComponent(gerarMensagem().replace(/\*/g, '')); // Removendo asteriscos de bold do whatsapp

            const url = `mailto:${EMAIL_DESTINO}?subject=${assunto}&body=${mensagem}`;
            window.location.href = url;
        }
    </script>
</body>

</html>
